<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>

    <link rel="stylesheet" href="signup.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <main class="split-container">

        <!-- Left Side -->
        <section class="left-pane">

            <header class="logo">
                <h2>Resume Flow</h2>
            </header>

            <article class="content-box">

                <h1>Create an Account</h1>

                <p class="details">
                    Join now to build a Professional Resume.
                </p>

                <form class="form">

                    <!-- Name -->
                    <label>
                        <p class="field-label">Name</p>
                        <input type="text"
                            id="name"
                            placeholder="Enter your Name..."
                            required>
                    </label>

                    <!-- Email -->
                    <label>
                        <p class="field-label">Email</p>
                        <input type="text"
                            id="email"
                            placeholder="Enter your Email..."
                            required>
                    </label>

                    <!-- Password -->
                    <label class="password-container">

                        <p class="field-label">Password</p>

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your Password..."
                            required>

                        <i class="fa-solid fa-eye"
                            id="togglePassword"></i>

                    </label>

                    <!-- Confirm Password -->
                    <label class="password-container">

                        <p class="field-label">Confirm Password</p>

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm your Password..."
                            required>

                        <i class="fa-solid fa-eye"
                            id="toggleConfirmPassword"></i>

                    </label>

                    <button type="submit" class="submit">
                        Register
                    </button>

                </form>

                <p class="or">Or Register With</p>

                <hr class="line">

                <p class="oauth-row">

                    <button class="google" type="button">

                        <img src="https://static.vecteezy.com/system/resources/previews/022/613/027/non_2x/google-icon-logo-symbol-free-png.png"
                            alt="Google"
                            width="18">

                        Google

                    </button>

                    <button class="apple" type="button">

                        <img src="https://www.freepnglogos.com/uploads/apple-logo-png/apple-logo-png-dallas-shootings-don-add-are-speech-zones-used-4.png"
                            alt="Apple"
                            width="18">

                        Apple

                    </button>

                </p>

                <p class="dont">
                    Already Have An Account?
                    <a href="login.html">Login Now.</a>
                </p>

            </article>

            <footer>

                <p>
                    Copyright © 2025 Sellora Enterprises LTD.
                </p>

                <a href="#">
                    Privacy Policy
                </a>

            </footer>

        </section>

        <!-- Right Side -->
        <aside class="right-pane">

            <section class="pane-content">

                <h2>
                    Build a Professional Resume using AI.
                </h2>

                <p>
                    Log in to access your account and manage your resumes.
                </p>

                <img
                    src="https://drive.google.com/thumbnail?id=1WP12EB5L4lGUek8USouAcV7kJocgKrPU&sz=w1000"
                    alt="Resume Preview"
                    class="mockup-img">

            </section>

        </aside>

    </main>

    <script src="script.js"></script>

</body>

</html>
